name: wonders
description: Explore the famous wonders of the world.
publish_to: "none"
version: 2.0.9+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  collection: ^1.15.0
  copy_with_extension: ^5.0.2
  drop_cap_text: ^1.1.3
  equatable: ^2.0.5
  extra_alignments: ^1.0.0+1
  flextras: ^1.0.0
  flutter_animate: ^4.1.1+1
  flutter_circular_text: ^0.3.1
  flutter_displaymode: ^0.6.0
  flutter_inappwebview: ^6.1.5
  flutter_native_splash: ^2.2.7
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.5
  gap: ^3.0.0
  get_it: ^7.2.0
  get_it_mixin: ^4.1.1
  google_maps_flutter: ^2.1.12
  google_maps_flutter_web: ^0.5.14+2
  go_router: ^16.2.1
  http: ^0.13.5
  image_fade: ^0.6.2
  internet_connection_checker: ^1.0.0+1
  intl: ^0.20.2
  json_annotation: ^4.6.0
  modal_bottom_sheet: ^3.0.0
  package_info_plus: ^9.0.0
  particle_field: ^1.0.0
  path_provider: ^2.0.11
  provider: ^6.0.2
  rnd: ^0.2.0
  screenshot: ^3.0.0
  share_plus: ^12.0.0
  shared_preferences: ^2.0.15
  simple_rich_text: ^2.0.49
  sized_context: ^1.0.0+1
  smooth_page_indicator: ^1.0.0+2
  unsplash_client: ^3.0.0
  youtube_player_iframe: ^5.2.2
  video_player: ^2.8.6
  # 显式指定 web 实现以兼容新版 Flutter Web 引导
  video_player_web: ^2.1.2
  flutter_cache_manager: ^3.3.1
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.0.0
  #amplify_flutter: ^1.1.0
  #amplify_storage_s3: ^1.1.0
  #amplify_auth_cognito: ^1.1.0
  photo_gallery: ^2.0.1
  image_picker: ^1.2.0
  video_thumbnail: ^0.5.3
  camera: ^0.11.2
  gallery_saver: ^2.3.2
  image_gallery_saver: ^2.0.3
  eventsource: ^0.4.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  audioplayers: ^6.5.1
  flutter_gen: ^5.9.0

dev_dependencies:
  build_runner: ^2.2.0
  copy_with_extension_gen: ^5.0.2
  icons_launcher: ^3.0.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_serializable: ^6.3.1
  dart_code_metrics: ^5.7.4

flutter_icons:
  ios: true
  android: true
  image_path: "assets/marketing/app-icon-1024.png"

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/_common/
    - assets/images/_common/icons/
    - assets/images/_common/texture/
    - assets/images/chichen_itza/
    - assets/images/christ_the_redeemer/
    - assets/images/colosseum/
    - assets/images/great_wall_of_china/
    - assets/images/machu_picchu/
    - assets/images/petra/
    - assets/images/pyramids/
    - assets/images/taj_mahal/
    - assets/images/collectibles/
    - assets/images/changjiang/
    - assets/images/raytec/
    - assets/images/anshex/
    - assets/images/weic/
    - assets/images/self/
    - assets/images/cmn/
    - assets/images/kaisei/
    - assets/images/ailawyer/
    - assets/data/resume_events.json
    - assets/data/resume_timeline.json
    - assets/data/resume_presentation.json
    - assets/data/resume_unsplash.json

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/CinzelDecorative-Regular.ttf
        - asset: assets/fonts/CinzelDecorative-Black.ttf
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
    - family: Yeseva
      fonts:
        - asset: assets/fonts/YesevaOne-Regular.ttf
    - family: Tenor
      fonts:
        - asset: assets/fonts/TenorSans-Regular.ttf
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway-Regular.ttf
        - asset: assets/fonts/Raleway-Italic.ttf
          style: italic
        - asset: assets/fonts/Raleway-Medium.ttf
          weight: 500
        - asset: assets/fonts/Raleway-Bold.ttf
          weight: 700
        - asset: assets/fonts/Raleway-ExtraBold.ttf
          weight: 800
    - family: MaShanZheng
      fonts:
        - asset: assets/fonts/MaShanZheng-Regular.ttf
    - family: B612Mono
      fonts:
        - asset: assets/fonts/B612Mono-Regular.ttf
